name: gst_solution
description: GST Invoicing & Return Filing SaaS Platform for Indian Small Businesses
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.2.0

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.4
  google_sign_in: ^6.2.1
  firebase_storage: ^11.6.5

  # HTTP & API
  dio: ^5.4.1
  retrofit: ^4.1.0
  pretty_dio_logger: ^1.3.1

  # Local Storage
  flutter_secure_storage: ^10.3.0
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # PDF Generation
  pdf: ^3.10.8
  printing: ^5.12.0
  path_provider: ^2.1.2

  # Text-to-Speech (voice conversation mode)
  flutter_tts: ^4.0.2

  # UI Components
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  lottie: ^3.1.0
  badges: ^3.1.2
  intl: ^0.19.0
  image_picker: ^1.0.7
  file_picker: ^8.0.0+1

  # Excel Export
  excel: ^4.0.2

  # Form Validation
  formz: ^0.7.0

  # Utils
  uuid: ^4.3.3
  share_plus: ^9.0.0
  url_launcher: ^6.2.5
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.0
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0
  dartz: ^0.10.1
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1

  # Ads
  google_mobile_ads: ^5.1.0

  # Chat
  flutter_chat_ui: ^1.6.13
  flutter_chat_types: ^3.6.2


  # Image
  image_cropper: ^7.0.3
  flutter_image_compress: ^2.2.0

  # OCR / Bill Scanning
  google_mlkit_text_recognition: ^0.13.0

  # QR / Barcode scanning & generation
  mobile_scanner: ^6.0.2
  qr_flutter: ^4.1.0
  barcode: ^2.2.9
  barcode_widget: ^2.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  retrofit_generator: ^8.1.0
  hive_generator: ^2.0.1
  mockito: ^5.4.4
  bloc_test: ^9.1.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/fonts/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

